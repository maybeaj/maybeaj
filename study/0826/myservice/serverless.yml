# "org" ensures this Service is used with the correct Serverless Framework Access Key.
org: maybeaj
# "app" enables Serverless Framework Dashboard features and sharing them with other Services.
app: my-service
# "service" is the name of this project. This will also be added to your AWS resource names.
service: my-service-students15


provider:
  name: aws
  region: ap-northeast-2
  runtime: nodejs20.x
  stage: ${opt:stage, 'dev'}
  deploymentBucket:
    name: tmd-genai1-students15
    blockPublicAccess: true
    serverSideEncryption: AES256
  environment:
    USERS_TABLE: ${self:service}-users-${sls:stage}

  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - dynamodb:GetItem
            - dynamodb:PutItem
            - dynamodb:UpdateItem
            - dynamodb:DeleteItem
            - dynamodb:DescribeTable          # (선택) 디버깅/확인용
          Resource:
            - arn:aws:dynamodb:${aws:region}:${aws:accountId}:table/${self:provider.environment.USERS_TABLE}

resources:
  Resources:
    UsersTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:provider.environment.USERS_TABLE}
        AttributeDefinitions:
          - AttributeName: id
            AttributeType: S
        KeySchema:
          - AttributeName: id
            KeyType: HASH
        BillingMode: PAY_PER_REQUEST

functions:
  getUser:
    handler: handler.getUser
    events:
      - httpApi:
          path: /users/{id}
          method: get
  createUser:
    handler: handler.createUser
    events:
      - httpApi:
          path: /users
          method: post
  updateUser:
    handler: handler.updateUser
    events:
      - httpApi:
          path: /users/{id}
          method: put
  deleteUser:
    handler: handler.deleteUser
    events:
      - httpApi:
          path: /users/{id}
          method: delete